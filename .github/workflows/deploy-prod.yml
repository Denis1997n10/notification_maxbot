name: deploy-prod
on:
  workflow_dispatch:
concurrency:
  group: deploy-prod
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: [self-hosted, linux, rn-prod-builder]
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "Automated production mutation is disabled until an explicit approval and secrets flow is configured."
          echo "Use the protected local flow after review: bash scripts/deploy_all.sh prod"
