name: deploy-dev
on:
  workflow_dispatch:
concurrency:
  group: deploy-dev
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: [self-hosted, linux, rn-prod-builder]
    steps:
      - uses: actions/checkout@v4
      - run: echo "deploy-dev from CI is disabled until runner-side .local/dev and secrets are configured; use local flow: yc init && ./scripts/bootstrap_yc.sh dev && ./scripts/deploy_all.sh dev"
