name: deploy-dev
on:
  workflow_dispatch:
concurrency:
  group: deploy-dev
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: [self-hosted, linux, rn-prod-builder]
    steps:
      - uses: actions/checkout@v4
      - run: echo "deploy-dev from CI is disabled until runner-side Yandex Cloud access is configured; use local flow after yc init: bash scripts/deploy_all.sh dev"
