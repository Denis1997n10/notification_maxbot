openapi: 3.0.0
info:
  title: notification-api
  version: 1.0.0
paths:
  /api/v1/bot/webhook:
    post:
      x-yc-apigateway-integration:
        type: cloud_functions
        function_id: "${bot_webhook_function_id}"
      responses: {'200': {description: ok}}
  /api/v1/public/entrances/{publicCode}:
    get:
      parameters:
        - name: publicCode
          in: path
          required: true
          schema: {type: string}
      x-yc-apigateway-integration:
        type: cloud_functions
        function_id: "${public_api_function_id}"
      responses: {'200': {description: ok}}
  /api/v1/public/districts:
    get:
      x-yc-apigateway-integration:
        type: cloud_functions
        function_id: "${public_api_function_id}"
      responses: {'200': {description: ok}}
  /api/v1/public/districts/{districtId}/houses:
    get:
      parameters:
        - name: districtId
          in: path
          required: true
          schema: {type: string}
      x-yc-apigateway-integration:
        type: cloud_functions
        function_id: "${public_api_function_id}"
      responses: {'200': {description: ok}}
  /api/v1/public/houses/{houseId}/entrances:
    get:
      parameters:
        - name: houseId
          in: path
          required: true
          schema: {type: string}
      x-yc-apigateway-integration:
        type: cloud_functions
        function_id: "${public_api_function_id}"
      responses: {'200': {description: ok}}
  /api/v1/admin/auth/login:
    post:
      x-yc-apigateway-integration:
        type: cloud_functions
        function_id: "${admin_api_function_id}"
      responses: {'200': {description: ok}}
  /api/v1/admin/{proxy+}:
    x-yc-apigateway-any-method:
      parameters:
        - name: proxy
          in: path
          required: true
          schema: {type: string}
      x-yc-apigateway-integration:
        type: cloud_functions
        function_id: "${admin_api_function_id}"
      responses: {'200': {description: ok}}
